name: Validate Release PR

# release/* 分支的发布策略门禁：仅接受 hotfix/* 或 backport/* 的 PR。
# main 只接受 feature/*、bugfix/*、cherry-pick/* 的 PR。
# hotfix/* 不直接进 main，必须先到 release/*，再按需 cherry-pick 回 main。
# 详见 docs/project-development-standard.md
on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-release-source:
    runs-on: ubuntu-latest
    if: startsWith(github.base_ref, 'release/') || github.base_ref == 'main'
    steps:
      - name: Check PR source branch
        run: |
          SRC="${{ github.head_ref }}"
          TGT="${{ github.base_ref }}"
          LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"

          echo "🔍 Validating PR into release branch"
          echo "  source: $SRC"
          echo "  target: $TGT"
          echo "  labels: $LABELS"

          if [[ "$TGT" == "main" ]]; then
            if [[ "$SRC" =~ ^feature/ ]]; then
              echo "✅ Allowed: feature/* branch into main"
              exit 0
            fi

            if [[ "$SRC" =~ ^bugfix/ ]]; then
              echo "✅ Allowed: bugfix/* branch into main"
              exit 0
            fi

            if [[ "$SRC" =~ ^cherry-pick/ ]]; then
              echo "✅ Allowed: cherry-pick/* branch into main"
              exit 0
            fi

            if [[ "$LABELS" =~ (^|,)(cherry-pick)(,|$) ]]; then
              echo "✅ Allowed: cherry-pick labeled PR into main"
              exit 0
            fi

            echo "❌ Rejected."
            echo "main 仅接受 feature/*、bugfix/*、cherry-pick/* 或 cherry-pick 标签的 PR。"
            exit 1
          fi

          if [[ "$SRC" =~ ^hotfix/ ]]; then
            echo "✅ Allowed: hotfix/* branch"
            exit 0
          fi

          if [[ "$SRC" =~ ^backport/ ]]; then
            echo "✅ Allowed: backport/* branch"
            exit 0
          fi

          echo "❌ Rejected."
          echo "release/* 仅接受："
          echo "  - 来自 hotfix/* 的 PR"
          echo "  - 来自 backport/* 的 PR"
          echo "禁止从 main / bugfix/* / feature/* / cherry-pick/* 直接合并到 release/*。"
          exit 1
